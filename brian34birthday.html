<!DOCTYPE html>
<html>
<head>
  <title>34 Days of You ❤️</title>
  <style>
    body {
      margin: 0;
      background: #fcd34d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      overflow: hidden;
    }

    .card {
      width: 300px;
      height: 450px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: absolute;
      text-align: center;
      padding: 20px;
      transition: transform 0.3s ease;
    }

    img {
      width: 100%;
      height: 250px;
      border-radius: 15px;
      object-fit: cover;
    }

    .name {
      font-size: 20px;
      margin-top: 10px;
    }

    .bio {
      font-size: 14px;
      color: gray;
    }

    .label {
      position: absolute;
      top: 20px;
      font-size: 30px;
      font-weight: bold;
      opacity: 0;
    }

    .like {
      right: 20px;
      color: green;
    }

    .nope {
      left: 20px;
      color: red;
    }

  </style>
</head>

<body>

<div class="card" id="card">
  <div class="label like" id="like">LIKE</div>
  <div class="label nope" id="nope">NOPE</div>

  <img src="https://via.placeholder.com/300x250">

  <div class="name">Kamu ❤️</div>
  <div class="bio">Swipe kanan kalau masih pilih aku 😏</div>
</div>

<script>
let card = document.getElementById("card");
let like = document.getElementById("like");
let nope = document.getElementById("nope");

let startX = 0;
let currentX = 0;
let isDragging = false;

card.addEventListener("mousedown", startDrag);
card.addEventListener("touchstart", startDrag);

function startDrag(e) {
  isDragging = true;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
}

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

function drag(e) {
  if (!isDragging) return;

  currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
  card.style.transform = `translateX(${currentX}px) rotate(${currentX/10}deg)`;

  if (currentX > 50) {
    like.style.opacity = 1;
    nope.style.opacity = 0;
  } else if (currentX < -50) {
    nope.style.opacity = 1;
    like.style.opacity = 0;
  } else {
    like.style.opacity = 0;
    nope.style.opacity = 0;
  }
}

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

function endDrag() {
  isDragging = false;

  if (currentX > 120) {
    card.style.transform = "translateX(1000px) rotate(30deg)";
    setTimeout(() => {
      window.location.href = "main.html";
    }, 300);
  } else if (currentX < -120) {
    card.style.transform = "translateX(-1000px) rotate(-30deg)";
  } else {
    card.style.transform = "translateX(0)";
    like.style.opacity = 0;
    nope.style.opacity = 0;
  }
}
</script>

</body>
</html>
