<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>34 Days of You 💛</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f5f5f5;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ===== CONTAINER ===== */
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* ===== CARD ===== */
.card {
  position: relative;
  width: 100%;
  height: 70vh;
  border-radius: 25px;
  overflow: hidden;
  background: black;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
}

/* ===== IMAGE ===== */
.image {
  width: 100%;
  height: 100%;
  background: url('clara.jpg') center/cover no-repeat;
}

/* ===== OVERLAY ===== */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* ===== VERIFIED ===== */
.verified {
  font-size: 12px;
  background: rgba(255,255,255,0.2);
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 10px;
}

/* ===== NAME ===== */
.name {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 5px;
}

/* ===== INFO ===== */
.info {
  font-size: 14px;
  line-height: 1.5;
}

/* ===== CLOSE BUTTON ===== */
.close {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.5);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== ACTION BUTTONS ===== */
.actions {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}

.btn:active {
  transform: scale(0.9);
}

.no-btn {
  background: white;
}

.yes-btn {
  background: #ff4458;
  color: white;
}

</style>
</head>

<body>

<div class="container">

  <div class="card" id="card">

    <div class="image"></div>

    <div class="close">✕</div>

    <div class="overlay">
      <div class="verified">✔ Photo verified</div>
      <div class="name">Clara, 31</div>
      <div class="info">
        💼 IT (SAP Business Operation) at FMCG <br>
        🎓 Universitas Atma Jaya Yogyakarta 2016
      </div>
    </div>

  </div>

  <!-- BUTTON DI LUAR CARD -->
  <div class="actions">
    <button class="btn no-btn" onclick="swipeLeft()">❌</button>
    <button class="btn yes-btn" onclick="swipeRight()">❤️</button>
  </div>

</div>

<script>
let card = document.getElementById("card");

function swipeRight() {
  card.style.transform = "translateX(400px) rotate(20deg)";
  setTimeout(() => {
    window.location.href = "main.html";
  }, 300);
}

function swipeLeft() {
  card.style.transform = "translateX(-400px) rotate(-20deg)";
}
</script>

</body>
</html>
