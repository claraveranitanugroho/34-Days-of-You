<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>34 Days of You 💛</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
    }

    .card {
      position: fixed;
      width: 100vw;
      height: 100vh;
      transition: transform 0.3s ease;
    }

    .image {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('clara.jpg') center/cover no-repeat;
      z-index: 1;
    }

    .overlay::before {
  content: "";
  position: absolute;
  bottom: -20px;
  left: 0;
  width: 100%;
  height: 200px;

  background: linear-gradient(
    to top,
    rgba(255, 105, 180, 0.4),
    transparent
  );

  z-index: -1;
}
    
    .overlay {
     position: absolute;
     bottom: 120px; /* 🔥 naik dari sebelumnya */
     width: 100%;
     color: white;
     padding: 20px;
     background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
     z-index: 2;
    }

    .verified {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 5px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .name {
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,105,180,0.6);
    }

    .info {
      font-size: 14px;
      margin-top: 5px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 24px;
      z-index: 3;
    }

    .label {
      position: absolute;
      top: 60px;
      font-size: 30px;
      font-weight: bold;
      opacity: 0;
      z-index: 4;
    }

    .like {
      right: 20px;
      color: #4CAF50;
    }

    .nope {
      left: 20px;
      color: red;
    }

    /* 🔥 BUTTON UI */
    .actions {
      position: absolute;
      bottom: calc(120px + env(safe-area-inset-bottom));
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      z-index: 999;
    }

    .btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .no-btn {
      background: white;
    }

    .yes-btn {
      background: #ff4458;
      color: white;
    }

  </style>
</head>

<body>

<div class="card" id="card">

  <div class="label like" id="like">LIKE</div>
  <div class="label nope" id="nope">NOPE</div>

  <div class="image"></div>

  <div class="close">✕</div>

  <div class="overlay">
    <div class="verified">✔ Photo verified</div>
    <div class="name">Clara, 31</div>
    <div class="info">
      💼 IT (SAP Business Operation) <br>
      🎓 Universitas Atma Jaya Yogyakarta 2016
    </div>
  </div>

  <!-- 🔥 BUTTON -->
  <div class="actions">
    <button class="btn no-btn" onclick="swipeLeft()">❌</button>
    <button class="btn yes-btn" onclick="swipeRight()">❤️</button>
  </div>

</div>

<script>
let card = document.getElementById("card");
let like = document.getElementById("like");
let nope = document.getElementById("nope");

let startX = 0;
let currentX = 0;
let isDragging = false;

card.addEventListener("touchstart", startDrag);
card.addEventListener("mousedown", startDrag);

function startDrag(e) {
  isDragging = true;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
}

document.addEventListener("touchmove", drag);
document.addEventListener("mousemove", drag);

function drag(e) {
  if (!isDragging) return;

  currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;

  card.style.transform = `translateX(${currentX}px) rotate(${currentX/15}deg)`;

  if (currentX > 50) {
    like.style.opacity = 1;
    nope.style.opacity = 0;
  } else if (currentX < -50) {
    nope.style.opacity = 1;
    like.style.opacity = 0;
  } else {
    like.style.opacity = 0;
    nope.style.opacity = 0;
  }
}

document.addEventListener("touchend", endDrag);
document.addEventListener("mouseup", endDrag);

function endDrag() {
  isDragging = false;

  if (currentX > 120) {
    swipeRight();
  } else if (currentX < -120) {
    swipeLeft();
  } else {
    resetCard();
  }
}

function swipeRight() {
  card.style.transform = "translateX(1000px) rotate(20deg)";
  setTimeout(() => {
    window.location.href = "main.html";
  }, 300);
}

function swipeLeft() {
  card.style.transform = "translateX(-1000px) rotate(-20deg)";
}

function resetCard() {
  card.style.transform = "translateX(0)";
  like.style.opacity = 0;
  nope.style.opacity = 0;
}
</script>

</body>
</html>
