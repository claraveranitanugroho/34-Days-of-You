<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>34 Days of You 💛</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
    }

    .card {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
    }

    /* GAMBAR */
    .image {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('clara.jpg') center/cover no-repeat;
      z-index: 1;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      color: white;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      z-index: 2;

      /* FIX MOBILE */
      padding-bottom: 80px;
    }

    .verified {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 5px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .name {
      font-size: 24px;
      font-weight: bold;
    }

    .info {
      font-size: 14px;
      margin-top: 5px;
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 24px;
      z-index: 3;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="image"></div>

  <div class="close">✕</div>

  <div class="overlay">
    <div class="verified">✔ Photo verified</div>
    <div class="name">Clara, 31</div>
    <div class="info">
      💼 IT (SAP Business Operation) <br>
      🎓 Universitas Atma Jaya Yogyakarta 2016
    </div>
  </div>

</div>

</body>
</html>
