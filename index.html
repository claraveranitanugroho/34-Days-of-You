<!DOCTYPE html>
<html>
<head>
  <title>34 Days of You 💛</title>

  <!-- Font biar lebih modern -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f7c948; /* Bumble yellow */
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 320px;
      height: 500px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      position: absolute;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .image {
      width: 100%;
      height: 70%;
      background-size: cover;
      background-position: center;
    }

    .info {
      padding: 15px;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
    }

    .bio {
      font-size: 14px;
      color: #555;
      margin-top: 5px;
    }

    .buttons {
      position: absolute;
      bottom: 15px;
      width: 100%;
      display: flex;
      justify-content: space-evenly;
    }

    .btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .no {
      background: white;
    }

    .yes {
      background: #ff4458;
      color: white;
    }

    .label {
      position: absolute;
      top: 30px;
      font-size: 28px;
      font-weight: bold;
      opacity: 0;
    }

    .like {
      right: 20px;
      color: #4CAF50;
    }

    .nope {
      left: 20px;
      color: #f44336;
    }

  </style>
</head>

<body>

<div class="card" id="card">

  <div class="label like" id="like">LIKE</div>
  <div class="label nope" id="nope">NOPE</div>

  <div class="image" style="background-image: url('FOTO_KALIAN.jpg');"></div>

  <div class="info">
    <div class="name">Nama Dia ❤️</div>
    <div class="bio">Swipe kanan kalau masih pilih aku 😏</div>
  </div>

  <div class="buttons">
    <button class="btn no" onclick="swipeLeft()">❌</button>
    <button class="btn yes" onclick="swipeRight()">❤️</button>
  </div>

</div>

<script>
let card = document.getElementById("card");
let like = document.getElementById("like");
let nope = document.getElementById("nope");

let startX = 0;
let currentX = 0;
let isDragging = false;

card.addEventListener("mousedown", startDrag);
card.addEventListener("touchstart", startDrag);

function startDrag(e) {
  isDragging = true;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
}

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

function drag(e) {
  if (!isDragging) return;

  currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
  card.style.transform = `translateX(${currentX}px) rotate(${currentX/10}deg)`;

  if (currentX > 50) {
    like.style.opacity = 1;
    nope.style.opacity = 0;
  } else if (currentX < -50) {
    nope.style.opacity = 1;
    like.style.opacity = 0;
  } else {
    like.style.opacity = 0;
    nope.style.opacity = 0;
  }
}

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

function endDrag() {
  isDragging = false;

  if (currentX > 120) {
    swipeRight();
  } else if (currentX < -120) {
    swipeLeft();
  } else {
    card.style.transform = "translateX(0)";
    like.style.opacity = 0;
    nope.style.opacity = 0;
  }
}

function swipeRight() {
  card.style.transform = "translateX(1000px) rotate(30deg)";
  setTimeout(() => {
    window.location.href = "main.html";
  }, 300);
}

function swipeLeft() {
  card.style.transform = "translateX(-1000px) rotate(-30deg)";
}
</script>

</body>
</html>
